name: Auto Sync with Upstream

# 1. 添加 permissions 请求写入权限
permissions:
  contents: write

on:
  schedule:
    # 当前时间是周六 05-09，如果你想周一运行
    # 对应北京时间 周一 01:00 (UTC时间 周日 17:00)
    - cron: '0 17 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 2. 修改 checkout 步骤，传入 token
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 传入默认的 GITHUB_TOKEN，配合上面的 permissions 实现读写
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git Config
        run: |
          git config user.name "Sync-Bot"
          git config user.email "bot@github.com"

      - name: Sync from Upstream
        run: |
          git remote add upstream https://github.com/Guovin/iptv-api.git
          git fetch upstream
          
          # 确保检出的是 master 分支（根据网页解析，该项目主分支为 master）
          git checkout master
          
          git merge upstream/master
          
          # 这里会尝试推送到你的仓库，现在有权限了
          git push origin master
